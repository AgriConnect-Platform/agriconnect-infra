name: Bootstrap — Post Terraform Apply

# Run manually after a fresh terraform apply to install ArgoCD,
# deploy the application, run DB migrations, and wire up CloudFront.

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

jobs:
  bootstrap:
    name: Bootstrap EKS & Deploy via ArgoCD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Verify ECR images were pushed by CI before attempting deploy ────────
      - name: Verify ECR images exist
        run: |
          FAILED=0
          for svc in auth marketplace order media notification; do
            COUNT=$(aws ecr list-images \
              --repository-name agriconnect-$svc \
              --region $AWS_REGION \
              --query "length(imageIds)" \
              --output text 2>/dev/null || echo "0")
            if [ "$COUNT" = "0" ] || [ "$COUNT" = "None" ]; then
              echo "ERROR: No images found in ECR for agriconnect-$svc"
              FAILED=1
            else
              echo "OK: agriconnect-$svc — $COUNT image(s) in ECR"
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "Bootstrap aborted: push images to ECR first by running the CI pipeline."
            exit 1
          fi

      # ── Read infra values from SSM ──────────────────────────────────────────
      - name: Read infra config from SSM
        run: |
          CLUSTER=$(aws ssm get-parameter --name /agriconnect/eks-cluster-name --query Parameter.Value --output text)
          LB_ROLE=$(aws ssm get-parameter --name /agriconnect/eks-lb-controller-role-arn --query Parameter.Value --output text)
          IRSA_ROLE=$(aws ssm get-parameter --name /agriconnect/eks-services-irsa-role-arn --query Parameter.Value --output text)
          SUBNETS=$(aws ssm get-parameter --name /agriconnect/public-subnet-ids --query Parameter.Value --output text)
          CF_ID=$(aws ssm get-parameter --name /agriconnect/cloudfront-distribution-id --query Parameter.Value --output text)
          echo "CLUSTER=$CLUSTER" >> $GITHUB_ENV
          echo "LB_ROLE=$LB_ROLE" >> $GITHUB_ENV
          echo "IRSA_ROLE=$IRSA_ROLE" >> $GITHUB_ENV
          echo "SUBNETS=$SUBNETS" >> $GITHUB_ENV
          echo "CF_ID=$CF_ID" >> $GITHUB_ENV
          echo "Cluster: $CLUSTER | Subnets: $SUBNETS"

      # ── kubectl + helm ──────────────────────────────────────────────────────
      - name: Configure kubectl
        run: aws eks update-kubeconfig --name $CLUSTER --region $AWS_REGION

      - uses: azure/setup-helm@v4

      # ── Install AWS Load Balancer Controller ────────────────────────────────
      - name: Install AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update

          kubectl create serviceaccount aws-load-balancer-controller -n kube-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl annotate serviceaccount aws-load-balancer-controller \
            -n kube-system \
            eks.amazonaws.com/role-arn=$LB_ROLE \
            --overwrite

          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=$CLUSTER \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set region=$AWS_REGION \
            --set vpcId=$(aws eks describe-cluster --name $CLUSTER --query "cluster.resourcesVpcConfig.vpcId" --output text) \
            --wait --timeout=5m

          kubectl wait deployment -n kube-system aws-load-balancer-controller \
            --for=condition=Available --timeout=5m

      # ── Install ArgoCD ──────────────────────────────────────────────────────
      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml --server-side --force-conflicts
          echo "Waiting for ArgoCD components to be ready..."
          kubectl wait --for=condition=available --timeout=300s deployment/argocd-server -n argocd
          kubectl wait --for=condition=available --timeout=300s deployment/argocd-repo-server -n argocd
          kubectl rollout status statefulset/argocd-application-controller -n argocd --timeout=300s
          echo "Giving ArgoCD 20s to fully initialise..."
          sleep 20

      # ── Give ArgoCD access to the private helm repo ─────────────────────────
      - name: Configure ArgoCD repo access
        run: |
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: agriconnect-helm-repo
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repository
          stringData:
            type: git
            url: https://github.com/AgriConnect-Platform/agriconnect-helm.git
            username: x-access-token
            password: ${{ secrets.GH_PAT }}
          EOF

      # ── Apply ArgoCD Applications (prod + dev) ─────────────────────────────
      - name: Apply ArgoCD Applications
        run: |
          # Production app — watches prod branch of helm repo → production namespace
          kubectl apply -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: agriconnect-prod
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: https://github.com/AgriConnect-Platform/agriconnect-helm.git
              targetRevision: prod
              path: helm/agriconnect
              helm:
                valueFiles:
                  - values.yaml
                parameters:
                  - name: global.irsaRoleArn
                    value: "$IRSA_ROLE"
                  - name: ingress.subnets
                    value: "$SUBNETS"
            destination:
              server: https://kubernetes.default.svc
              namespace: production
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
          EOF

          # Dev app — watches dev branch of helm repo → dev namespace
          kubectl apply -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: agriconnect-dev
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: https://github.com/AgriConnect-Platform/agriconnect-helm.git
              targetRevision: dev
              path: helm/agriconnect
              helm:
                valueFiles:
                  - values.yaml
                parameters:
                  - name: global.irsaRoleArn
                    value: "$IRSA_ROLE"
                  - name: ingress.subnets
                    value: "$SUBNETS"
                  - name: global.namespace
                    value: "dev"
            destination:
              server: https://kubernetes.default.svc
              namespace: dev
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
          EOF

      # ── ArgoCD diagnostics — repo access + app conditions ───────────────────
      - name: ArgoCD diagnostics
        run: |
          echo "=== Repo secret ==="
          kubectl get secret agriconnect-helm-repo -n argocd \
            -o jsonpath='{.data.url}' | base64 -d && echo ""

          echo "=== Repo-server logs (last 30 lines) ==="
          kubectl logs -n argocd deployment/argocd-repo-server --tail=30 2>/dev/null || echo "(no logs)"

          echo "=== App-controller logs (last 30 lines) ==="
          kubectl logs -n argocd statefulset/argocd-application-controller --tail=30 2>/dev/null || \
            kubectl logs -n argocd -l app.kubernetes.io/name=argocd-application-controller --tail=30 2>/dev/null || \
            echo "(no logs)"

          echo "=== Application conditions ==="
          kubectl get application agriconnect-prod -n argocd \
            -o jsonpath='{.status.conditions}' 2>/dev/null | tr ',' '\n' || echo "(no conditions)"

          echo "=== Application operationState ==="
          kubectl get application agriconnect-prod -n argocd \
            -o jsonpath='{.status.operationState}' 2>/dev/null | tr ',' '\n' || echo "(none)"

      # ── Force ArgoCD to refresh and sync immediately ────────────────────────
      - name: Force ArgoCD sync
        run: |
          echo "Triggering hard refresh on both apps..."
          kubectl annotate application agriconnect-prod -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite
          kubectl annotate application agriconnect-dev -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite
          sleep 30
          echo "Triggering immediate sync operation (bypasses 3-min automated loop)..."
          kubectl patch application agriconnect-prod -n argocd \
            -p '{"operation": {"sync": {"prune": true, "syncOptions": ["CreateNamespace=true", "ServerSideApply=true"]}}}' \
            --type merge
          kubectl patch application agriconnect-dev -n argocd \
            -p '{"operation": {"sync": {"prune": true, "syncOptions": ["CreateNamespace=true", "ServerSideApply=true"]}}}' \
            --type merge
          echo "Waiting 60s for sync to complete initial resources..."
          sleep 60

      # ── Wait for ArgoCD to sync and become healthy ──────────────────────────
      - name: Wait for ArgoCD sync
        run: |
          echo "Waiting for ArgoCD application to become healthy (max 5 min)..."
          HEALTHY=false
          for i in $(seq 1 30); do
            SYNC=$(kubectl get application agriconnect-prod -n argocd \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            HEALTH=$(kubectl get application agriconnect-prod -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            echo "Attempt $i/30 — Sync: $SYNC, Health: $HEALTH"
            if [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ]; then
              echo "ArgoCD application is synced and healthy!"
              HEALTHY=true
              break
            fi
            # Only fail fast if Synced+Degraded (sync done but pods still broken)
            # If OutOfSync+Degraded, keep waiting — ArgoCD is still rolling out new images
            if [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Degraded" ]; then
              echo "Sync complete but health is Degraded — breaking early to dump diagnostics"
              break
            fi
            sleep 10
          done

          if [ "$HEALTHY" = "false" ]; then
            echo ""
            echo "============================================================"
            echo " DIAGNOSTICS"
            echo "============================================================"
            echo ""
            echo "--- ArgoCD app status ---"
            kubectl get application agriconnect-prod -n argocd -o yaml | grep -A 20 "status:"
            echo ""
            echo "--- All pods (production) ---"
            kubectl get pods -n production -o wide
            echo ""
            echo "--- Deployments ---"
            kubectl get deployments -n production
            echo ""
            echo "--- Pod events (all) ---"
            kubectl get events -n production --sort-by='.lastTimestamp' | tail -40
            echo ""
            for svc in auth marketplace order media notification; do
              echo "--- Logs: $svc-service (last 40 lines) ---"
              kubectl logs -n production -l app=$svc-service --tail=40 --all-containers 2>/dev/null \
                || echo "(no logs — pod may not have started)"
              echo ""
            done
            echo "--- Describe first crashing pod ---"
            CRASH_POD=$(kubectl get pods -n production --field-selector=status.phase!=Running \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "$CRASH_POD" ]; then
              kubectl describe pod $CRASH_POD -n production
            else
              kubectl describe pods -n production | grep -A 5 "State:\|Reason:\|Message:"
            fi
            echo "============================================================"
            exit 1
          fi

      # ── Wait for ALB URL ────────────────────────────────────────────────────
      - name: Wait for ALB DNS
        run: |
          echo "Waiting for ALB to be provisioned..."
          for i in $(seq 1 30); do
            ALB_URL=$(kubectl get ingress agriconnect-ingress -n production \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$ALB_URL" ]; then
              echo "ALB_URL=$ALB_URL" >> $GITHUB_ENV
              echo "ALB ready: $ALB_URL"
              break
            fi
            echo "Attempt $i/30 — ALB not ready yet, waiting 10s..."
            sleep 10
          done
          if [ -z "$ALB_URL" ]; then
            echo "ERROR: ALB URL not available after 5 minutes"
            exit 1
          fi

      # ── Update CloudFront to point at new ALB ───────────────────────────────
      - name: Update CloudFront origin
        run: |
          python3 - <<'PYEOF'
          import boto3, os

          cf = boto3.client('cloudfront')
          cf_id = os.environ['CF_ID']
          alb   = os.environ['ALB_URL']

          resp = cf.get_distribution_config(Id=cf_id)
          etag = resp['ETag']
          cfg  = resp['DistributionConfig']

          updated = 0
          for origin in cfg['Origins']['Items']:
              domain = origin.get('DomainName', '')
              # Match placeholder (first apply) or real ALB (re-run)
              if 'elb.amazonaws.com' in domain or 'placeholder' in domain or '.amazonaws.com' in domain:
                  if 's3' not in domain:
                      print(f"Updating origin {origin['Id']}: {domain} -> {alb}")
                      origin['DomainName'] = alb
                      updated += 1
          if updated == 0:
              print("WARNING: no matching ALB origin found — check CloudFront origins manually")
              import json; print(json.dumps([o['DomainName'] for o in cfg['Origins']['Items']]))

          cf.update_distribution(Id=cf_id, DistributionConfig=cfg, IfMatch=etag)
          print(f"CloudFront updated. New ALB: {alb}")
          PYEOF

      # ── Store new ALB URL in SSM ────────────────────────────────────────────
      - name: Store ALB URL in SSM
        run: |
          aws ssm put-parameter \
            --name /agriconnect/alb-dns-name \
            --value $ALB_URL \
            --type String \
            --overwrite
          echo "Stored ALB URL in SSM: $ALB_URL"

      # ── Run database migration ──────────────────────────────────────────────
      - name: Run DB migration
        run: |
          AUTH_IMAGE=$(kubectl get deployment auth-service -n production \
            -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "Migration image: $AUTH_IMAGE"

          kubectl delete pod db-migrate -n production --ignore-not-found=true
          sleep 3

          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Pod
          metadata:
            name: db-migrate
            namespace: production
          spec:
            serviceAccountName: agriconnect-services
            restartPolicy: Never
            containers:
            - name: migrate
              image: $AUTH_IMAGE
              command: ["node", "/app/shared/scripts/migrate.js"]
              envFrom:
              - configMapRef:
                  name: agriconnect-config
              env:
              - name: AWS_REGION
                value: "$AWS_REGION"
              - name: AWS_DEFAULT_REGION
                value: "$AWS_REGION"
          EOF

          echo "Polling migration pod phase..."
          for i in $(seq 1 36); do
            PHASE=$(kubectl get pod db-migrate -n production \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
            echo "Attempt $i/36 — Phase: $PHASE"
            if [ "$PHASE" = "Succeeded" ] || [ "$PHASE" = "Failed" ]; then
              break
            fi
            sleep 10
          done

          echo "=== Migration logs ==="
          kubectl logs db-migrate -n production 2>/dev/null || echo "(no logs)"

          FINAL=$(kubectl get pod db-migrate -n production \
            -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
          if [ "$FINAL" != "Succeeded" ]; then
            echo "ERROR: Migration pod phase is '$FINAL'"
            kubectl describe pod db-migrate -n production
            exit 1
          fi
          echo "Migration completed successfully!"

      # ── Run database seed ───────────────────────────────────────────────────
      - name: Run DB seed
        run: |
          AUTH_IMAGE=$(kubectl get deployment auth-service -n production \
            -o jsonpath='{.spec.template.spec.containers[0].image}')

          kubectl delete pod db-seed -n production --ignore-not-found=true
          sleep 3

          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Pod
          metadata:
            name: db-seed
            namespace: production
          spec:
            serviceAccountName: agriconnect-services
            restartPolicy: Never
            containers:
            - name: seed
              image: $AUTH_IMAGE
              command: ["node", "/app/shared/scripts/seed.js"]
              envFrom:
              - configMapRef:
                  name: agriconnect-config
              env:
              - name: AWS_REGION
                value: "$AWS_REGION"
              - name: AWS_DEFAULT_REGION
                value: "$AWS_REGION"
          EOF

          echo "Polling seed pod phase..."
          for i in $(seq 1 36); do
            PHASE=$(kubectl get pod db-seed -n production \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
            echo "Attempt $i/36 — Phase: $PHASE"
            if [ "$PHASE" = "Succeeded" ] || [ "$PHASE" = "Failed" ]; then
              break
            fi
            sleep 10
          done

          echo "=== Seed logs ==="
          kubectl logs db-seed -n production 2>/dev/null || echo "(no logs)"

          FINAL=$(kubectl get pod db-seed -n production \
            -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
          if [ "$FINAL" != "Succeeded" ]; then
            echo "ERROR: Seed pod phase is '$FINAL'"
            kubectl describe pod db-seed -n production
            exit 1
          fi
          echo "Seed completed successfully!"

      # ── Install Metrics Server + Prometheus + Grafana + Alertmanager ────────
      - name: Install monitoring stack (Metrics Server + kube-prometheus-stack)
        run: |
          # Metrics Server — needed for HPA CPU/memory autoscaling
          helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          helm upgrade --install metrics-server metrics-server/metrics-server \
            --namespace kube-system \
            --set args[0]="--kubelet-insecure-tls" \
            --wait --timeout=3m

          echo "Metrics Server installed — kubectl top nodes/pods now works"

          EMAIL_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id agriconnect/dev/email \
            --query SecretString --output text 2>/dev/null || echo '{}')
          SMTP_USER=$(echo "$EMAIL_SECRET" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('user',''))" 2>/dev/null || echo "")
          SMTP_PASS=$(echo "$EMAIL_SECRET" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('pass',''))" 2>/dev/null || echo "")

          # Write values using Python to safely inject SMTP credentials
          python3 - "$SMTP_USER" "$SMTP_PASS" <<'PYEOF'
          import sys
          smtp_user = sys.argv[1] if len(sys.argv) > 1 else ""
          smtp_pass = sys.argv[2] if len(sys.argv) > 2 else ""
          config = """alertmanager:
            config:
              global:
                smtp_smarthost: 'smtp.gmail.com:587'
                smtp_from: '__USER__'
                smtp_auth_username: '__USER__'
                smtp_auth_password: '__PASS__'
                smtp_require_tls: true
              route:
                group_by: ['alertname', 'namespace']
                group_wait: 30s
                group_interval: 5m
                repeat_interval: 4h
                receiver: agriconnect-email
              receivers:
              - name: agriconnect-email
                email_configs:
                - to: asadchamp109@gmail.com
                  send_resolved: true
                  headers:
                    Subject: '[AgriConnect] Monitoring Alert'
              inhibit_rules:
              - source_matchers: [severity="critical"]
                target_matchers: [severity="warning"]
                equal: [alertname, namespace]
          grafana:
            adminPassword: AgriConnect@2024
            defaultDashboardsEnabled: true
            service:
              type: ClusterIP
          prometheus:
            prometheusSpec:
              retention: 7d
              resources:
                requests:
                  memory: 256Mi
                limits:
                  memory: 512Mi
          kubeControllerManager:
            enabled: false
          kubeScheduler:
            enabled: false
          kubeEtcd:
            enabled: false
          """.replace('__USER__', smtp_user).replace('__PASS__', smtp_pass)
          with open('/tmp/prom-values.yaml', 'w') as f:
              f.write(config)
          print("Prometheus values file written.")
          PYEOF

          helm upgrade --install kube-prometheus-stack \
            prometheus-community/kube-prometheus-stack \
            --namespace monitoring --create-namespace \
            --values /tmp/prom-values.yaml \
            --wait --timeout=10m \
            || echo "WARNING: kube-prometheus-stack timed out — check pods in 'monitoring' namespace"

          echo ""
          echo "=== Monitoring stack installed ==="
          echo "Grafana:    kubectl port-forward -n monitoring svc/kube-prometheus-stack-grafana 3000:80"
          echo "Prometheus: kubectl port-forward -n monitoring svc/kube-prometheus-stack-prometheus 9090:9090"
          echo "Login:      admin / AgriConnect@2024"

      # ── Cleanup ─────────────────────────────────────────────────────────────
      - name: Cleanup one-off pods
        if: always()
        run: |
          kubectl delete pod db-migrate db-seed -n production --ignore-not-found=true

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Bootstrap complete
        run: |
          CF_DOMAIN=$(aws cloudfront get-distribution --id $CF_ID --query "Distribution.DomainName" --output text)
          echo ""
          echo "================================================"
          echo "  Bootstrap complete!"
          echo "================================================"
          echo "  App URL   : https://$CF_DOMAIN"
          echo "  ALB URL   : $ALB_URL"
          echo "  Login     : admin@agriconnect.com / password123"
          echo "================================================"
          echo ""
          echo "IMPORTANT: Update terraform.tfvars with the new ALB DNS:"
          echo "  eks_alb_dns_name = \"$ALB_URL\""
